<!DOCTYPE html>
<html>
  <head>
    <style>
      img {
        width: 200px;
        height: 200px;
      }
    </style>
    <script>
      function displ() {
        // об'єкт р - елемент с id="fmkto"
        p = document.getElementById("fmkto");
        // змінюємо у об'єкта style властивість display
        if (p.style.display == "none") {
          p.style.display = "block";
        } else {
          p.style.display = "none";
        }
      }
      function displ() {
        p1 = document.getElementById("fmkto1");
      if (p1.style.display == "none") {
          p1.style.display = "block";
        } else {
          p1.style.display = "none";
        }
      }
    </script>
  </head>
  <body>
    <p>
      <img src="fmkto.jpg" id="fmkto" /> <br /><br />
      <input type="button" value="Відобразити / сховати рисунок" onclick="displ();" />
    </p>
  <p1>
    <img src="fmkto1.jpg" id="fmkto1" /> <br /><br />
      <input type="button" value="Відобразити / сховати рисунок" onclick="displ();" />
  </p1>
  </body>
</html>
