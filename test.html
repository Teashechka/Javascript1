<!DOCTYPE html>
<html>
  <head>
    <style>
        body {
            background-color: darkblue;
            display: flex;
            justify-content: center;
            padding-top: 50px;
        }
      img {
        width: 200px;
        height: 200px;
      }
      .img-box {
            width: 200px;
            height: 200px;
            margin: 5px;
        }
        .p {
            border: 50px outset #ffA089;
        }
        .div {
            border: 50px outset #89ffA0;
          }
    </style>
    <script>
      function displ(id) {
        let p = document.getElementById(id);
        if (p.style.display === "none") {
          p.style.display = "block";
        } else {
          p.style.display = "none";
        }
      }
    </script>
  </head>
  <body>
    <p>
      <img src="fmkto.jpg" id="fmkto" /> <br /><br />
      <input type="button" value="Сховай мене / Покажи мене" onclick="displ('fmkto');" />
    </p>
    <div>
      <img src="fmkto1.jpg" id="fmkto1" /> <br /><br />
      <input type="button" value="Сховай мене / Покажи мене" onclick="displ('fmkto1');" />
    </div>
  </body>
</html>
